<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zyron | الرئيسية</title>

    <link rel="stylesheet" href="css/home.css">

</head>

<body>

<header>

    <div class="logo">
        <h1>Zyron</h1>
    </div>

    <nav>

        <a href="home.html">الرئيسية</a>

        <a href="explore.html">استكشاف</a>

        <a href="messages.html">الرسائل</a>

        <a href="notifications.html">الإشعارات</a>

        <a href="profile.html">الملف الشخصي</a>

        <a href="settings.html">الإعدادات</a>

    </nav>

</header>

<main>

<section class="create-post">

    <h2>إنشاء منشور</h2>

    <textarea
        id="postText"
        placeholder="بماذا تفكر؟"></textarea>

    <br>

    <input
        type="file"
        id="postImage"
        accept="image/*,video/*">

    <br><br>

    <button id="publishPost">

        نشر

    </button>

</section>

<hr>

<section class="feed">

    <article class="post">

        <h3>اسم المستخدم</h3>

        <small>@username</small>

        <p>

            مرحبًا بكم في منصة Zyron 🚀

        </p>

        <img
            src="images/post.jpg"
            alt="Post Image"
            width="100%">

        <div class="actions">

            <button>❤️ إعجاب</button>

            <button>💬 تعليق</button>

            <button>🔁 إعادة نشر</button>

            <button>🔖 حفظ</button>

            <button>📤 مشاركة</button>

        </div>

    </article>

</section>

</main>

<script src="js/home.js"></script>

</body>

</html>
