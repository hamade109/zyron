<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zyron | تسجيل الدخول</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="logo">

            <h1>Zyron</h1>

            <p>مرحبًا بعودتك</p>

        </div>

        <form id="loginForm">

            <div class="input-group">

                <label>البريد الإلكتروني</label>

                <input
                    type="email"
                    id="email"
                    placeholder="example@email.com"
                    required>

            </div>

            <div class="input-group">

                <label>كلمة المرور</label>

                <input
                    type="password"
                    id="password"
                    placeholder="********"
                    required>

            </div>

            <div class="remember">

                <label>

                    <input type="checkbox">

                    تذكرني

                </label>

            </div>

            <button type="submit">

                تسجيل الدخول

            </button>

        </form>

        <div class="links">

            <a href="signup.html">

                إنشاء حساب جديد

            </a>

            <br><br>

            <a href="#">

                نسيت كلمة المرور؟

            </a>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
