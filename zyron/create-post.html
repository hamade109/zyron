<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>إنشاء منشور - Zyron</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="create-post.css">
</head>

<body>

    <header>
        <h1>Zyron</h1>

        <nav>
            <a href="home.html">الرئيسية</a>
            <a href="explore.html">استكشاف</a>
            <a href="messages.html">الرسائل</a>
            <a href="notifications.html">الإشعارات</a>
            <a href="profile.html">الملف الشخصي</a>
            <a href="settings.html">الإعدادات</a>
            <a href="index.html" id="logoutBtn">تسجيل الخروج</a>
        </nav>
    </header>


    <main class="create-post-page">

        <section class="create-post-box">

            <h2>إنشاء منشور جديد</h2>

            <form id="createPostForm">

                <!-- نص المنشور -->
                <label for="postText">
                    ماذا تريد أن تشارك؟
                </label>

                <textarea
                    id="postText"
                    placeholder="اكتب منشورك هنا..."
                    maxlength="1000"
                ></textarea>


                <!-- رفع صورة أو فيديو -->
                <label for="postMedia">
                    إضافة صورة أو فيديو
                </label>

                <input
                    type="file"
                    id="postMedia"
                    accept="image/*,video/*"
                >


                <!-- معاينة الملف -->
                <div
                    id="mediaPreview"
                    class="media-preview"
                ></div>


                <!-- عداد الأحرف -->
                <p class="character-counter">
                    <span id="characterCount">0</span>
                    / 1000
                </p>


                <!-- الأزرار -->
                <div class="post-actions">

                    <button
                        type="submit"
                        id="publishPostBtn"
                    >
                        نشر
                    </button>

                    <a
                        href="home.html"
                        class="cancel-btn"
                    >
                        إلغاء
                    </a>

                </div>

            </form>

        </section>

    </main>


    <footer>
        <p>© 2026 Zyron</p>
    </footer>


    <!-- JavaScript -->
    <script src="script.js"></script>
    <script src="create-post.js"></script>

</body>

</html>
